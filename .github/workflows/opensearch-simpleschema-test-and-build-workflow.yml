name: Test and Build OpenSearch Simple Schema Backend Plugin

on:
  workflow_dispatch:
  pull_request:
  push:
    branches-ignore:
      - 'dependabot/**'

jobs:
  build:
    strategy:
      matrix:
        java:
          - 11
          - 17

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@50fbc622fc4ef5163becd7fab6573eac35f8462e # v1

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@b6e674f4b717d7b0ae3baee0fbe79f498905dfde # v1
        with:
          java-version: ${{ matrix.java }}

      - name: Build with Gradle
        run: |
          ./gradlew build

      - name: Upload coverage
        uses: codecov/codecov-action@29386c70ef20e286228c72b668a06fd0e8399192 # v1
        with:
          flags: opensearch-simpleschema
          directory: opensearch-simpleschema/
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Create Artifact Path
        run: |
          mkdir -p simpleschema-builds
          cp -r ./build/distributions/*.jar simpleschema-builds/

      - name: Upload Artifacts
        uses: actions/upload-artifact@3446296876d12d4e3a0f3145a3c87e67bf0a16b5 # v1
        with:
          name: opensearch-simpleschema
          path: simpleschema-builds
